<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tipografía elegante -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter:wght@300&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background-color: #0a0a0a;
      color: #eaeaea;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 600px;
      padding: 80px 20px;
      text-align: left;
    }

    .intro {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 60px;
      opacity: 0.8;
    }

    img {
      width: 100px;
      border-radius: 2px;
      margin-bottom: 30px;
      filter: grayscale(100%) contrast(110%);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .section {
      margin-top: 40px;
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.85;
    }

    .links a {
      display: block;
      margin-top: 8px;
      color: #eaeaea;
      text-decoration: none;
      position: relative;
    }

    .links a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 1px;
      background: #eaeaea;
      transition: 0.3s;
    }

    .links a:hover::after {
      width: 100%;
    }

  </style>
</head>

<body>

  <div class="container">



  

    <h1>Vicente Aguado</h1>

    <div class="section">
      Contemporary artist based in Valencia, Spain.  
      Works around perception, mass and social control and the conceptual instability of the images.
    </div>

    

    

   <div class="section links">

  <a href="https://www.saatchiart.com/vicenteaguado" target="_blank" rel="noopener noreferrer">
    • View available works
  </a>

  <a href="https://www.instagram.com/_vicenteaguado_/" target="_blank" rel="noopener noreferrer">
    • Check my Instagram account
  </a>

</div>

</body>
</html>
